<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bowie State University NIST PREP Consortium - Job Opportunities</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        .job-posting { transition: all 0.3s ease; }
        .job-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .job-posting.active .job-content { max-height: 9999px; }
        .rotate-chevron { transform: rotate(180deg); }
    </style>
</head>

<body class="bg-gray-50">

<header class="bg-[#FDB913] text-white shadow-lg">
    <div class="container mx-auto px-4 py-6 flex flex-col items-center text-center">
        <img src="bsu-logo.png" class="h-32 mb-4">
    </div>
</header>

<div class="bg-gray-800 h-4 w-full shadow-lg"></div>

<main class="container mx-auto px-4 py-8">

    <div class="md:w-5/6 mx-auto font-semibold">
        <h1 class="text-3xl md:text-5xl text-center font-bold mb-4">
            NIST PREP HMHC Consortium
        </h1>
        <h2 class="text-center mb-6 font-bold">
            Bowie State University - Job Opportunities
        </h2>
    </div>

    <section class="md:w-3/4 mx-auto mt-10">
        <h2 class="text-2xl font-bold text-center mb-6">Current Openings</h2>

        <!-- 🔥 JOBS RENDER HERE -->
        <div id="job-container" class="space-y-6"></div>
    </section>

</main>

<footer class="bg-gray-800 text-white py-6 mt-12 text-center">
    <p>&copy; 2025 Bowie State University</p>
</footer>

<script>
async function loadJobs() {
    try {
        const res = await fetch('jobs.json'); // make sure file is here
        const jobs = await res.json();

        const container = document.getElementById('job-container');

        jobs.forEach(job => {
            const el = document.createElement('div');
            el.className = "job-posting bg-white rounded-lg shadow-md border";

            el.innerHTML = `
                <div class="p-6 cursor-pointer flex justify-between items-center" onclick="toggleJob(this)">
                    <div>
                        <div class="flex items-center mb-2">
                            <h3 class="text-xl font-bold">${job.title || ''}</h3>
                            <span class="ml-3 text-xs bg-gray-100 px-2 py-1 rounded">
                                ${job.level || ''}
                            </span>
                        </div>

                        <div class="flex flex-wrap gap-4 text-gray-600 text-sm">
                            <span><i class="fas fa-building mr-2 text-[#FDB913]"></i>${job.location || ''}</span>
                            <span><i class="fas fa-clock mr-2 text-[#FDB913]"></i>${job.work_type || ''}</span>
                            <span><i class="fas fa-map-marker-alt mr-2 text-[#FDB913]"></i>${job.mode || ''}</span>
                            <span><i class="fas fa-hourglass-half mr-2 text-[#FDB913]"></i>${job.duration || ''}</span>
                        </div>
                    </div>
                    <i class="fas fa-chevron-down text-[#FDB913]"></i>
                </div>

                <div class="job-content px-6">
                    <div class="border-t pt-4 pb-6 space-y-6">

                        <div>
                            <h4 class="font-bold">Opportunity No.: ${job.opportunity_number || ''}</h4>
                        </div>

                        ${renderSection("Job Description", job.description)}
                        ${renderList("Responsibilities", job.responsibilities)}
                        ${renderList("Qualifications", job.qualifications)}
                        ${renderList("Other Details", job.other_details)}

                        <div class="text-right">
                            <a href="${job.apply_link}" target="_blank"
                               class="bg-[#FDB913] text-white px-4 py-2 rounded hover:bg-black">
                                Apply Now
                            </a>
                        </div>

                    </div>
                </div>
            `;

            container.appendChild(el);
        });

    } catch (err) {
        console.error("Error loading jobs:", err);
    }
}

function renderSection(title, content) {
    if (!content) return '';
    return `
        <div>
            <h4 class="font-bold mb-2">${title}</h4>
            <p class="text-gray-600">${content}</p>
        </div>
    `;
}

function renderList(title, items) {
    if (!items || items.length === 0) return '';
    return `
        <div>
            <h4 class="font-bold mb-2">${title}</h4>
            <ul class="list-disc pl-6 text-gray-600 space-y-1">
                ${items.map(i => `<li>${i}</li>`).join('')}
            </ul>
        </div>
    `;
}

function toggleJob(element) {
    const job = element.closest('.job-posting');
    const icon = element.querySelector('i');

    job.classList.toggle('active');
    icon.classList.toggle('rotate-chevron');

    document.querySelectorAll('.job-posting').forEach(j => {
        if (j !== job) {
            j.classList.remove('active');
            const i = j.querySelector('i');
            if (i) i.classList.remove('rotate-chevron');
        }
    });
}

document.addEventListener('DOMContentLoaded', loadJobs);
</script>

</body>
</html>
